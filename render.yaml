services:
  - type: web
    name: ibex35-predictor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
    plan: free
